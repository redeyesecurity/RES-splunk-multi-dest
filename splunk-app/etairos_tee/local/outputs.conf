# Multi-destination outputs: production indexer + lakehouse tee
# UF sends to both simultaneously; each negotiates protocol independently.
[tcpout]
defaultGroup = splunk_indexer, lakehouse_tee

# Destination 1: Production Splunk indexer (S2S v3, ACK enabled)
[tcpout:splunk_indexer]
server = 192.168.1.239:9997
useACK = true
compressed = false

# Destination 2: Local lakehouse tee (S2S v3, no ACK)
# Protocol version is controlled by tee's IX response, not these settings.
# negotiateNewProtocol=false is advisory only on UF 9.x — receiver response drives negotiation.
[tcpout:lakehouse_tee]
server = 127.0.0.1:19997
useACK = false
compressed = false
