# Persistent scripted input — Splunk manages lifecycle, restarts on crash
# The wrapper script calls `splunk cmd python3` to use the bundled Python 3
[script://$SPLUNK_HOME/bin/scripts/etairos_tee.sh]
interval = -1
sourcetype = etairos:internal
index = _internal
disabled = 0

# Monitor the app's own log
[monitor://$SPLUNK_HOME/var/log/splunk/etairos_tee.log]
sourcetype = etairos:tee:log
index = _internal
disabled = 0
