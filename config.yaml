# etairos-log-agent configuration
# Standalone agent version
# Start with: python3 agent.py --config config.yaml

# ---------------------------------------------------------------------------
# Inbound listener (from Splunk Universal Forwarder)
# ---------------------------------------------------------------------------
listener:
  host: "0.0.0.0"
  port: 9997

  tls:
    enabled: false
    cert: ""
    key: ""
    ca: ""
    verify_client: false
    ignore_ssl: false

# ---------------------------------------------------------------------------
# Local output (decoded events written to disk)
# ---------------------------------------------------------------------------
output:
  file: "/var/log/etairos/events.log"

# ---------------------------------------------------------------------------
# Forward (upstream to real Splunk indexer)
# ---------------------------------------------------------------------------
forward:
  enabled: true
  host: ""
  port: 9997

  tls:
    enabled: false
    cert: ""
    key: ""
    ca: ""
    ignore_ssl: false

  failover:
    mode: "fail-open"
    queue_max: 100000
    reconnect_delay: 2
    retry_forever: true
    max_retries: 0

# ---------------------------------------------------------------------------
# Alternate Stream - Send OCSF events to any destination
# Multiple destinations can be enabled simultaneously
# ---------------------------------------------------------------------------
alternate_stream:
  enabled: true
  
  destinations:
    # ---------------------------------------------------------------------------
    # Local JSON (testing/debugging)
    # No dependencies
    # ---------------------------------------------------------------------------
    - type: "local-json"
      enabled: false
      path: "/var/log/etairos/events"
      partition_by: "day"     # day | hour | none

    # ---------------------------------------------------------------------------
    # Local Parquet (on-prem data lake)
    # Requires: pip install pyarrow
    # ---------------------------------------------------------------------------
    - type: "local-parquet"
      enabled: false
      path: "/var/log/etairos/parquet"
      partition_by: "day"

    # ---------------------------------------------------------------------------
    # AWS S3 / MinIO / Cloudflare R2
    # Requires: pip install pyarrow boto3
    # ---------------------------------------------------------------------------
    - type: "s3"
      enabled: false
      bucket: ""
      prefix: "etairos/ocsf"
      region: "us-east-1"
      endpoint_url: ""        # For MinIO/R2: https://your-endpoint
      access_key: ""          # blank = IAM role / env vars
      secret_key: ""
      partition_by: "day"

    # ---------------------------------------------------------------------------
    # Kafka / Confluent Cloud / Redpanda
    # Requires: pip install confluent-kafka
    # ---------------------------------------------------------------------------
    - type: "kafka"
      enabled: false
      brokers:
        - "kafka1:9092"
        - "kafka2:9092"
        - "kafka3:9092"
      topic: "security-events"
      
      # Authentication
      sasl:
        enabled: false
        mechanism: "PLAIN"    # PLAIN | SCRAM-SHA-256 | SCRAM-SHA-512
        username: ""
        password: ""
      
      tls:
        enabled: false
        ca: ""
        cert: ""              # For mutual TLS
        key: ""
      
      # Producer tuning
      compression: "snappy"   # none | gzip | snappy | lz4 | zstd
      acks: "all"             # 0 | 1 | all
      batch_size: 16384       # bytes
      linger_ms: 5            # wait up to N ms to batch
      buffer_memory: 33554432 # 32MB producer buffer

    # ---------------------------------------------------------------------------
    # Grafana Loki
    # Requires: pip install requests
    # ---------------------------------------------------------------------------
    - type: "loki"
      enabled: false
      url: "http://loki:3100/loki/api/v1/push"
      
      # Authentication
      auth:
        type: "none"          # none | basic | bearer
        username: ""
        password: ""
        token: ""             # For bearer auth
      
      # Static labels (applied to all events)
      labels:
        job: "etairos-tee"
        env: "production"
        # host label added automatically from event
      
      # Dynamic labels from event fields (optional)
      label_fields:
        - "sourcetype"
        - "source"
      
      tls:
        enabled: false
        ca: ""
        verify: true
      
      batch_size: 100
      flush_interval: 10      # seconds

    # ---------------------------------------------------------------------------
    # Elasticsearch / OpenSearch
    # Requires: pip install elasticsearch (or opensearch-py)
    # ---------------------------------------------------------------------------
    - type: "elasticsearch"
      enabled: false
      hosts:
        - "https://es1:9200"
        - "https://es2:9200"
      
      # Index settings
      index: "security-events"
      index_date_pattern: "%Y.%m.%d"  # security-events-2026.04.07
      
      # Authentication
      auth:
        type: "none"          # none | basic | api_key | cloud_id
        username: ""
        password: ""
        api_key: ""
        cloud_id: ""          # Elastic Cloud
      
      tls:
        enabled: true
        ca: ""
        verify: true
      
      # Bulk API settings
      batch_size: 500
      flush_interval: 5
      max_retries: 3

    # ---------------------------------------------------------------------------
    # Generic Webhook (HTTP POST)
    # Requires: pip install requests
    # ---------------------------------------------------------------------------
    - type: "webhook"
      enabled: false
      url: "https://your-endpoint.com/events"
      method: "POST"
      
      headers:
        Content-Type: "application/json"
        Authorization: "Bearer your-token"
        X-Custom-Header: "value"
      
      # Payload format
      format: "json"          # json (array) | ndjson (newline-delimited)
      batch: true             # true = batch into array, false = one req per event
      
      batch_size: 100
      flush_interval: 10
      timeout: 30             # seconds
      
      # Retry on failure
      retry:
        enabled: true
        max_attempts: 3
        backoff_ms: 1000      # exponential backoff base

    # ---------------------------------------------------------------------------
    # Syslog (RFC 5424)
    # No dependencies (stdlib socket)
    # ---------------------------------------------------------------------------
    - type: "syslog"
      enabled: false
      host: "syslog.corp"
      port: 514
      protocol: "tcp"         # tcp | udp | tls
      
      facility: 16            # 0-23 (16 = local0)
      severity: 6             # 0-7 (6 = info)
      app_name: "etairos-tee"
      
      tls:
        enabled: false
        ca: ""
        verify: true
      
      # For UDP, messages are sent immediately
      # For TCP/TLS, batching applies
      batch_size: 50
      flush_interval: 5

    # ---------------------------------------------------------------------------
    # Azure Event Hubs
    # Requires: pip install azure-eventhub
    # ---------------------------------------------------------------------------
    - type: "azure-eventhub"
      enabled: false
      connection_string: ""   # From Azure portal
      eventhub_name: "security-events"
      batch_size: 100
      flush_interval: 10

    # ---------------------------------------------------------------------------
    # Google Cloud Pub/Sub
    # Requires: pip install google-cloud-pubsub
    # ---------------------------------------------------------------------------
    - type: "gcp-pubsub"
      enabled: false
      project_id: ""
      topic_id: "security-events"
      credentials_file: ""    # Path to service account JSON (blank = ADC)
      batch_size: 100
      flush_interval: 10

    # ---------------------------------------------------------------------------
    # Splunk HEC (HTTP Event Collector)
    # Requires: pip install requests
    # Use this to send to a different Splunk instance or Cribl
    # ---------------------------------------------------------------------------
    - type: "splunk-hec"
      enabled: false
      url: "https://splunk-hec:8088/services/collector/event"
      token: ""               # HEC token
      index: "main"
      sourcetype: "etairos:ocsf"
      tls:
        verify: true
      batch_size: 100
      flush_interval: 10

  # Global defaults (overridden by per-destination settings)
  batch_size: 1000
  flush_interval: 60

# ---------------------------------------------------------------------------
# Indexer ACK (fake acknowledgment back to UF)
# ---------------------------------------------------------------------------
ack:
  enabled: auto
  mode: simple
  window_size: 1

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"
  log_every_n: 500
